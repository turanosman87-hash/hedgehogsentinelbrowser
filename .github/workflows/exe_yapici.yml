name: Hedgehog EXE Builder

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Tools
      run: |
        pip install PyQt6 PyQt6-WebEngine pyinstaller

    - name: Build EXE (No-Fail Mode)
      run: |
        # --collect-all komutu Windows'taki kütüphane hatalarını çözer
        pyinstaller --onedir --windowed --collect-all PyQt6 --collect-all PyQt6_WebEngine --name "Hedgehog_Sentinel" main.py

    - name: Upload EXE Folder
      uses: actions/upload-artifact@v4
      with:
        name: Hedgehog_Sentinel_Windows
        path: dist/Hedgehog_Sentinel/
