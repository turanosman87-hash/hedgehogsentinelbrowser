name: Hedgehog Sentinel EXE Build

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Kodlari Cek
      uses: actions/checkout@v4

    - name: Dosyalari Kontrol Et (Hata Ayiklama)
      run: dir  # Bu komut GitHub'ın hangi dosyaları gördüğünü bize loglarda gösterecek

    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kutphaneleri Yukle
      run: |
        pip install PyQt6 PyQt6-WebEngine pyinstaller

  - name: Create EXE (DLL Hatalarini Coz)
      run: |
        pyinstaller --onefile --windowed --collect-all PyQt6 --collect-all PyQt6_WebEngine --name "Hedgehog_Sentinel" main.py

    - name: Dosyayi Yukle
      uses: actions/upload-artifact@v4
      with:
        name: Hedgehog-Sentinel-Windows-Surumu
        path: dist/Hedgehog_Sentinel.exe
